name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyzk pytz ruff

      - name: Lint with ruff
        run: ruff check zkteco_attendance/ --ignore E501

      - name: Check for syntax errors
        run: python -m py_compile \
          zkteco_attendance/hooks.py \
          zkteco_attendance/install.py \
          zkteco_attendance/doctype/biometric_device/biometric_device.py \
          zkteco_attendance/doctype/attendance_sync_log/attendance_sync_log.py \
          zkteco_attendance/doctype/device_employee_mapping/device_employee_mapping.py \
          zkteco_attendance/utils/zk_connector.py \
          zkteco_attendance/utils/sync_engine.py \
          zkteco_attendance/scheduler/jobs.py

      - name: Validate DocType JSON
        run: |
          python -c "
          import json, glob, sys
          files = glob.glob('zkteco_attendance/**/*.json', recursive=True)
          errors = []
          for f in files:
              try:
                  json.load(open(f))
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('JSON errors:')
              for e in errors: print(e)
              sys.exit(1)
          print(f'All {len(files)} JSON files valid.')
          "
